<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>妄想山海热点追踪 - 2026年</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            color: white;
            padding: 40px 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }

        .header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header .update-time {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.5em;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }

        .platform-icon {
            display: inline-block;
            width: 30px;
            height: 30px;
            margin-right: 10px;
            vertical-align: middle;
        }

        .hot-item {
            padding: 15px;
            margin: 10px 0;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .hot-item h3 {
            color: #667eea;
            margin-bottom: 8px;
            font-size: 1.1em;
        }

        .hot-item p {
            font-size: 0.95em;
            line-height: 1.6;
            color: #555;
        }

        .hot-item .time {
            color: #999;
            font-size: 0.85em;
            margin-top: 8px;
        }

        .version-update {
            background: linear-gradient(135deg, #ff6b6b 0%, #feca57 100%);
            color: white;
        }

        .version-update h2 {
            color: white;
            border-bottom-color: white;
        }

        .version-update .hot-item {
            background: rgba(255, 255, 255, 0.2);
            border-left-color: white;
        }

        .version-update .hot-item h3 {
            color: white;
        }

        .version-update .hot-item p {
            color: rgba(255, 255, 255, 0.9);
        }

        .version-update .hot-item .time {
            color: rgba(255, 255, 255, 0.7);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .stat-card .number {
            font-size: 2.5em;
            font-weight: bold;
            color: #667eea;
        }

        .stat-card .label {
            color: #666;
            margin-top: 10px;
        }

        .chart-container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .chart-container h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 1.2em;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 2px solid #fcc;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2em;
            }
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎮 妄想山海热点追踪</h1>
            <p class="update-time">最后更新: <span id="lastUpdate">加载中...</span></p>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="number" id="totalHotItems">0</div>
                <div class="label">总热点数量</div>
            </div>
            <div class="stat-card">
                <div class="number" id="platformCount">4</div>
                <div class="label">覆盖平台</div>
            </div>
            <div class="stat-card">
                <div class="number" id="updateCount">0</div>
                <div class="label">今日更新</div>
            </div>
        </div>

        <div class="chart-container">
            <h2>📊 各平台热点分布</h2>
            <canvas id="platformChart"></canvas>
        </div>

        <div class="grid">
            <div class="card version-update">
                <h2>🔥 最新版本更新</h2>
                <div id="versionContent">
                    <div class="loading">加载中...</div>
                </div>
            </div>

            <div class="card">
                <h2>📱 抖音热点</h2>
                <div id="douyinContent">
                    <div class="loading">加载中...</div>
                </div>
            </div>

            <div class="card">
                <h2>📺 快手热点</h2>
                <div id="kuaishouContent">
                    <div class="loading">加载中...</div>
                </div>
            </div>

            <div class="card">
                <h2>🎬 B站热点</h2>
                <div id="bilibiliContent">
                    <div class="loading">加载中...</div>
                </div>
            </div>

            <div class="card">
                <h2>💬 贴吧讨论</h2>
                <div id="tiebaContent">
                    <div class="loading">加载中...</div>
                </div>
            </div>

            <div class="card">
                <h2>📈 趋势分析</h2>
                <div id="trendContent">
                    <div class="loading">加载中...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 数据存储路径
        const DATA_FILE = 'hot_data.json';

        // 加载数据
        async function loadHotData() {
            try {
                const response = await fetch(DATA_FILE + '?t=' + Date.now());
                if (!response.ok) {
                    throw new Error('无法加载数据');
                }
                const data = await response.json();
                return data;
            } catch (error) {
                console.error('加载数据失败:', error);
                return null;
            }
        }

        // 更新最后更新时间
        function updateLastUpdate() {
            const now = new Date();
            const timeStr = now.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            document.getElementById('lastUpdate').textContent = timeStr;
        }

        // 渲染版本更新
        function renderVersionUpdate(data) {
            const container = document.getElementById('versionContent');
            if (!data || !data.versionUpdate) {
                container.innerHTML = '<div class="error">暂无版本更新数据</div>';
                return;
            }

            const version = data.versionUpdate;
            let html = `
                <div class="hot-item">
                    <h3>${version.title}</h3>
                    <p><strong>更新时间:</strong> ${version.date}</p>
                    <p><strong>停服时间:</strong> ${version.maintenanceTime}</p>
                    <p><strong>更新内容:</strong></p>
                    <ul style="margin-left: 20px; margin-top: 10px;">
                        ${version.content.map(item => `<li>${item}</li>`).join('')}
                    </ul>
                </div>
            `;
            container.innerHTML = html;
        }

        // 渲染平台热点
        function renderPlatformHot(containerId, platformData) {
            const container = document.getElementById(containerId);
            if (!platformData || platformData.items.length === 0) {
                container.innerHTML = '<div class="error">暂无热点数据</div>';
                return;
            }

            let html = '';
            platformData.items.forEach((item, index) => {
                html += `
                    <div class="hot-item">
                        <h3>${index + 1}. ${item.title}</h3>
                        <p>${item.description}</p>
                        <p class="time">${item.time}</p>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        // 渲染趋势分析
        function renderTrendAnalysis(data) {
            const container = document.getElementById('trendContent');
            if (!data || !data.trendAnalysis) {
                container.innerHTML = '<div class="error">暂无趋势分析数据</div>';
                return;
            }

            const trend = data.trendAnalysis;
            let html = '';
            trend.items.forEach(item => {
                html += `
                    <div class="hot-item">
                        <h3>${item.title}</h3>
                        <p>${item.description}</p>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        // 渲染统计
        function renderStats(data) {
            let totalHotItems = 0;
            if (data.douyin) totalHotItems += data.douyin.items.length;
            if (data.kuaishou) totalHotItems += data.kuaishou.items.length;
            if (data.bilibili) totalHotItems += data.bilibili.items.length;
            if (data.tieba) totalHotItems += data.tieba.items.length;

            document.getElementById('totalHotItems').textContent = totalHotItems;
            document.getElementById('updateCount').textContent = data.todayUpdates || 0;
        }

        // 渲染图表
        function renderChart(data) {
            const ctx = document.getElementById('platformChart').getContext('2d');
            
            const platformCounts = {
                '抖音': data.douyin ? data.douyin.items.length : 0,
                '快手': data.kuaishou ? data.kuaishou.items.length : 0,
                'B站': data.bilibili ? data.bilibili.items.length : 0,
                '贴吧': data.tieba ? data.tieba.items.length : 0
            };

            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(platformCounts),
                    datasets: [{
                        data: Object.values(platformCounts),
                        backgroundColor: [
                            '#FF6B6B',
                            '#4ECDC4',
                            '#45B7D1',
                            '#FFA07A'
                        ],
                        borderWidth: 2,
                        borderColor: '#fff'
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            position: 'bottom'
                        }
                    }
                }
            });
        }

        // 主渲染函数
        async function renderPage() {
            const data = await loadHotData();
            
            if (!data) {
                document.querySelectorAll('.loading').forEach(el => {
                    el.textContent = '暂无数据，请等待数据更新';
                });
                return;
            }

            // 更新时间
            if (data.lastUpdate) {
                document.getElementById('lastUpdate').textContent = data.lastUpdate;
            } else {
                updateLastUpdate();
            }

            // 渲染各部分
            renderVersionUpdate(data);
            renderPlatformHot('douyinContent', data.douyin);
            renderPlatformHot('kuaishouContent', data.kuaishou);
            renderPlatformHot('bilibiliContent', data.bilibili);
            renderPlatformHot('tiebaContent', data.tieba);
            renderTrendAnalysis(data);
            renderStats(data);
            renderChart(data);
        }

        // 页面加载时渲染
        renderPage();

        // 每5分钟自动刷新
        setInterval(renderPage, 5 * 60 * 1000);
    </script>
</body>
</html>
