<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>妄想山海热点追踪 - 2026年</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            color: white;
            padding: 40px 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }

        .header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header .update-time {
            font-size: 1.2em;
            opacity: 0.9;
            margin-top: 10px;
        }

        .date-selector {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            display: inline-block;
        }

        .date-selector label {
            color: white;
            font-size: 1em;
            margin-right: 10px;
        }

        .date-selector input {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            cursor: pointer;
            background: white;
            min-width: 150px;
        }

        .date-selector input:focus {
            outline: 2px solid #667eea;
        }

        /* 设置日期选择器图标的样式 */
        .date-selector input::-webkit-calendar-picker-indicator {
            cursor: pointer;
            filter: invert(0.4);
            margin-left: 5px;
            padding: 0;
        }

        .date-selector input {
            position: relative;
        }

        .date-selector button {
            padding: 10px 20px;
            margin-left: 10px;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            cursor: pointer;
            background: #4ECDC4;
            color: white;
            font-weight: bold;
            transition: background 0.3s;
        }

        .date-selector button:hover {
            background: #45B7D1;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.5em;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }

        .hot-item {
            padding: 15px;
            margin: 10px 0;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .hot-item h3 {
            color: #667eea;
            margin-bottom: 8px;
            font-size: 1.1em;
        }

        .hot-item p {
            font-size: 0.95em;
            line-height: 1.6;
            color: #555;
        }

        .hot-item .time {
            color: #999;
            font-size: 0.85em;
            margin-top: 8px;
        }

        .version-update {
            background: linear-gradient(135deg, #ff6b6b 0%, #feca57 100%);
            color: white;
        }

        .version-update h2 {
            color: white;
            border-bottom-color: white;
        }

        .version-update .hot-item {
            background: rgba(255, 255, 255, 0.2);
            border-left-color: white;
        }

        .version-update .hot-item h3 {
            color: white;
        }

        .version-update .hot-item p {
            color: rgba(255, 255, 255, 0.9);
        }

        .version-update .hot-item .time {
            color: rgba(255, 255, 255, 0.7);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .stat-card .number {
            font-size: 2.5em;
            font-weight: bold;
            color: #667eea;
        }

        .stat-card .label {
            color: #666;
            margin-top: 10px;
        }

        .chart-container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .chart-container h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .chart-wrapper {
            position: relative;
            width: 60%;
            max-width: 400px;
            margin: 0 auto;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 1.2em;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 2px solid #fcc;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2em;
            }
            .grid {
                grid-template-columns: 1fr;
            }
            .chart-wrapper {
                width: 90%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎮 妄想山海热点追踪</h1>
            <p class="update-time">最后更新: <span id="lastUpdate">加载中...</span></p>

            <div class="date-selector">
                <label for="dateSelect">选择日期:</label>
                <input type="date" id="dateSelect">
                <button onclick="loadSelectedDate()" style="background: #4ECDC4;">查看</button>
                <button onclick="loadTodayData()" style="background: #667eea;">今天</button>
            </div>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="number" id="totalHotItems">0</div>
                <div class="label">总热点数量</div>
            </div>
            <div class="stat-card">
                <div class="number" id="platformCount">4</div>
                <div class="label">覆盖平台</div>
            </div>
            <div class="stat-card">
                <div class="number" id="updateCount">0</div>
                <div class="label">当日更新</div>
            </div>
        </div>

        <div class="chart-container">
            <h2>📊 热点关键词分布</h2>
            <div class="chart-wrapper">
                <canvas id="platformChart"></canvas>
            </div>
        </div>

        <div class="grid">
            <div class="card version-update">
                <h2>🔥 版本更新</h2>
                <div id="versionContent">
                    <div class="loading">加载中...</div>
                </div>
            </div>

            <div class="card">
                <h2>📱 抖音热点</h2>
                <div id="douyinContent">
                    <div class="loading">加载中...</div>
                </div>
            </div>

            <div class="card">
                <h2>📺 快手热点</h2>
                <div id="kuaishouContent">
                    <div class="loading">加载中...</div>
                </div>
            </div>

            <div class="card">
                <h2>🎬 B站热点</h2>
                <div id="bilibiliContent">
                    <div class="loading">加载中...</div>
                </div>
            </div>

            <div class="card">
                <h2>💬 贴吧讨论</h2>
                <div id="tiebaContent">
                    <div class="loading">加载中...</div>
                </div>
            </div>

            <div class="card">
                <h2>📈 趋势分析</h2>
                <div id="trendContent">
                    <div class="loading">加载中...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 全局变量
        let chartInstance = null;
        let currentData = null;

        // 可用的历史日期列表
        const availableDates = [
            '2026-03-15',
            '2026-03-16',
            '2026-03-17',
            '2026-03-18',
            '2026-03-19',
            '2026-03-20'
        ];

        // 系统最后更新时间（固定值）
        let systemLastUpdate = '';

        // 加载系统最后更新时间
        async function loadSystemLastUpdate() {
            try {
                const response = await fetch('hot_data.json?t=' + Date.now());
                if (response.ok) {
                    const data = await response.json();
                    systemLastUpdate = data.lastUpdate || new Date().toLocaleDateString();
                    document.getElementById('lastUpdate').textContent = systemLastUpdate;
                }
            } catch (error) {
                console.error('加载系统更新时间失败:', error);
                document.getElementById('lastUpdate').textContent = '加载失败';
            }
        }

        // 初始化日期选择器
        function initDateSelector() {
            const today = new Date();
            const dateSelect = document.getElementById('dateSelect');

            // 设置最小日期为7天前
            const minDate = new Date();
            minDate.setDate(minDate.getDate() - 7);
            dateSelect.min = formatDate(minDate);

            // 设置最大日期为昨天（今天没有历史数据）
            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);
            dateSelect.max = formatDate(yesterday);

            // 初始不设置值，避免加载不存在的日期
            dateSelect.value = '';
        }

        // 格式化日期为YYYY-MM-DD
        function formatDate(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        // 加载今天的数据
        async function loadTodayData() {
            const today = formatDate(new Date());
            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);
            const yesterdayStr = formatDate(yesterday);

            // 如果有昨天的数据，加载昨天的；否则加载默认数据
            if (availableDates.includes(yesterdayStr)) {
                document.getElementById('dateSelect').value = yesterdayStr;
                await loadDataForDate(yesterdayStr);
            } else {
                document.getElementById('dateSelect').value = '';
                await loadDefaultData();
            }
        }

        // 加载选择的日期数据
        async function loadSelectedDate() {
            const selectedDate = document.getElementById('dateSelect').value;

            if (!selectedDate) {
                alert('请先选择一个日期');
                return;
            }

            if (!availableDates.includes(selectedDate)) {
                alert(`${selectedDate} 暂无数据，请选择其他日期`);
                return;
            }

            await loadDataForDate(selectedDate);
        }

        // 根据日期加载数据
        async function loadDataForDate(date, showAlert = true) {
            const dataFile = `hot_data_${date}.json`;

            try {
                const response = await fetch(dataFile + '?t=' + Date.now());
                if (!response.ok) {
                    throw new Error('数据不存在');
                }
                const data = await response.json();
                currentData = data;
                renderPage(data);
                // 不再更新lastUpdate，保持系统固定的最后更新时间
            } catch (error) {
                console.error('加载数据失败:', error);
                // 如果历史数据不存在，显示提示，但不要自动跳转
                if (showAlert) {
                    alert(`${date} 的数据不存在`);
                }
            }
        }

        // 加载今天的默认数据
        async function loadDefaultData() {
            try {
                const response = await fetch('hot_data.json?t=' + Date.now());
                if (!response.ok) {
                    throw new Error('无法加载数据');
                }
                const data = await response.json();
                currentData = data;
                renderPage(data);
                // 不再更新lastUpdate，保持系统固定的最后更新时间
            } catch (error) {
                console.error('加载数据失败:', error);
                document.querySelectorAll('.loading').forEach(el => {
                    el.textContent = '暂无数据，请等待数据更新';
                });
            }
        }

        // 渲染版本更新
        function renderVersionUpdate(data) {
            const container = document.getElementById('versionContent');
            if (!data || !data.versionUpdate) {
                container.innerHTML = '<div class="error">该日期暂无版本更新数据</div>';
                return;
            }

            const version = data.versionUpdate;
            let html = `
                <div class="hot-item">
                    <h3>${version.title}</h3>
                    <p><strong>更新时间:</strong> ${version.date}</p>
                    <p><strong>停服时间:</strong> ${version.maintenanceTime}</p>
                    <p><strong>更新内容:</strong></p>
                    <ul style="margin-left: 20px; margin-top: 10px;">
                        ${version.content.map(item => `<li>${item}</li>`).join('')}
                    </ul>
                </div>
            `;
            container.innerHTML = html;
        }

        // 渲染平台热点
        function renderPlatformHot(containerId, platformData) {
            const container = document.getElementById(containerId);
            if (!platformData || platformData.items.length === 0) {
                container.innerHTML = '<div class="error">该日期暂无热点数据</div>';
                return;
            }

            let html = '';
            platformData.items.forEach((item, index) => {
                html += `
                    <div class="hot-item">
                        <h3>${index + 1}. ${item.title}</h3>
                        <p>${item.description}</p>
                        <p class="time">${item.time}</p>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        // 渲染趋势分析
        function renderTrendAnalysis(data) {
            const container = document.getElementById('trendContent');
            if (!data || !data.trendAnalysis) {
                container.innerHTML = '<div class="error">该日期暂无趋势分析数据</div>';
                return;
            }

            const trend = data.trendAnalysis;
            let html = '';
            trend.items.forEach(item => {
                html += `
                    <div class="hot-item">
                        <h3>${item.title}</h3>
                        <p>${item.description}</p>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        // 渲染统计
        function renderStats(data) {
            let totalHotItems = 0;
            if (data.douyin) totalHotItems += data.douyin.items.length;
            if (data.kuaishou) totalHotItems += data.kuaishou.items.length;
            if (data.bilibili) totalHotItems += data.bilibili.items.length;
            if (data.tieba) totalHotItems += data.tieba.items.length;

            document.getElementById('totalHotItems').textContent = totalHotItems;
            document.getElementById('updateCount').textContent = data.todayUpdates || 0;
        }

        // 渲染图表（调整大小）
        function renderChart(data) {
            const ctx = document.getElementById('platformChart').getContext('2d');

            // 销毁旧图表
            if (chartInstance) {
                chartInstance.destroy();
            }

            // 提取关键词
            const keywords = {};

            // 定义关键词映射
            const keywordPatterns = {
                '神躯外相': ['神躯外相', '风神因因乎', '因因乎'],
                '驭兽争霸': ['驭兽争霸', 'S1赛季', '赛季', '斗兽'],
                '宠物进化': ['进化', '龙子', '千年', '宠物', '豢龙'],
                '回归活动': ['回归', '奖励', '领取'],
                '版本更新': ['更新', '版本', '停服'],
                '攻略教学': ['攻略', '教学', '连招', '搭配'],
                '实战演示': ['实战', '演示', '秒杀', '伤害']
            };

            // 从所有平台的热点标题中提取关键词
            const platforms = ['douyin', 'kuaishou', 'bilibili', 'tieba'];
            platforms.forEach(platform => {
                if (data[platform] && data[platform].items) {
                    data[platform].items.forEach(item => {
                        const title = item.title + ' ' + item.description;
                        for (const [keyword, patterns] of Object.entries(keywordPatterns)) {
                            if (patterns.some(pattern => title.includes(pattern))) {
                                keywords[keyword] = (keywords[keyword] || 0) + 1;
                                break;
                            }
                        }
                    });
                }
            });

            // 如果没有匹配到关键词，使用默认数据
            if (Object.keys(keywords).length === 0) {
                keywords['其他'] = 1;
            }

            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(keywords),
                    datasets: [{
                        data: Object.values(keywords),
                        backgroundColor: [
                            '#FF6B6B',
                            '#4ECDC4',
                            '#45B7D1',
                            '#FFA07A',
                            '#98D8C8',
                            '#F7DC6F',
                            '#BB8FCE'
                        ],
                        borderWidth: 2,
                        borderColor: '#fff'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            position: 'right',
                            labels: {
                                font: {
                                    size: 12
                                },
                                padding: 15,
                                usePointStyle: true
                            }
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    const total = context.dataset.data.reduce((a, b) => a + b, 0);
                                    const percentage = ((context.raw / total) * 100).toFixed(1);
                                    return `${context.label}: ${context.raw} (${percentage}%)`;
                                }
                            }
                        }
                    }
                }
            });
        }

        // 主渲染函数
        function renderPage(data) {
            // 渲染各部分
            renderVersionUpdate(data);
            renderPlatformHot('douyinContent', data.douyin);
            renderPlatformHot('kuaishouContent', data.kuaishou);
            renderPlatformHot('bilibiliContent', data.bilibili);
            renderPlatformHot('tiebaContent', data.tieba);
            renderTrendAnalysis(data);
            renderStats(data);
            renderChart(data);
        }

        // 页面加载时初始化
        window.onload = function() {
            initDateSelector();
            // 加载系统最后更新时间
            loadSystemLastUpdate();
            // 初始加载最近可用的历史数据
            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);
            const yesterdayStr = formatDate(yesterday);

            if (availableDates.includes(yesterdayStr)) {
                loadDataForDate(yesterdayStr);
                document.getElementById('dateSelect').value = yesterdayStr;
            } else {
                // 如果昨天没有数据，加载默认数据
                loadDefaultData();
            }
        };

        // 每5分钟自动刷新
        setInterval(() => {
            const selectedDate = document.getElementById('dateSelect').value;
            const today = formatDate(new Date());

            // 如果没有选择日期，则刷新今天的默认数据
            if (!selectedDate) {
                loadDefaultData();
            } else {
                // 如果选择的是历史日期，只刷新该日期的数据，不显示提示
                loadDataForDate(selectedDate, false);
            }
        }, 5 * 60 * 1000);
    </script>
</body>
</html>
