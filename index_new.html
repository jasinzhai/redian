<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏热点追踪 - 首页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #11998e 100%);
            padding: 20px;
        }

        .container {
            max-width: 900px;
            width: 100%;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 50px;
        }

        .header h1 {
            font-size: 3.5em;
            margin-bottom: 15px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.3em;
            opacity: 0.9;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .game-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 40px;
            text-align: center;
            transition: all 0.4s ease;
            cursor: pointer;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .game-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .game-card.wangxiang:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        .game-card.fc:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        .game-icon {
            font-size: 5em;
            margin-bottom: 20px;
            display: block;
        }

        .game-card h2 {
            font-size: 2.2em;
            margin-bottom: 15px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .game-card p {
            font-size: 1.1em;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            padding: 15px 40px;
            font-size: 1.2em;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        .btn-wangxiang {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-wangxiang:hover {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
        }

        .btn-fc {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }

        .btn-fc:hover {
            background: linear-gradient(135deg, #38ef7d 0%, #11998e 100%);
        }

        .stats {
            margin-top: 50px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            text-align: center;
        }

        .stats h3 {
            font-size: 1.8em;
            color: white;
            margin-bottom: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.15);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(5px);
        }

        .stat-item .number {
            font-size: 2.5em;
            font-weight: bold;
            color: white;
            margin-bottom: 5px;
        }

        .stat-item .label {
            font-size: 1em;
            color: rgba(255, 255, 255, 0.8);
        }

        .footer {
            text-align: center;
            color: white;
            margin-top: 50px;
            padding: 20px;
            font-size: 0.9em;
            opacity: 0.7;
        }

        .footer a {
            color: white;
            text-decoration: none;
            margin: 0 10px;
            transition: opacity 0.3s;
        }

        .footer a:hover {
            opacity: 1;
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2.5em;
            }
            .game-card {
                padding: 30px;
            }
            .game-icon {
                font-size: 4em;
            }
            .game-card h2 {
                font-size: 1.8em;
            }
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎮 游戏热点追踪</h1>
            <p>实时追踪热门游戏的最新动态和热点内容</p>
        </div>

        <div class="game-grid">
            <div class="game-card wangxiang" onclick="window.location.href='index.html'">
                <span class="game-icon">🎮</span>
                <h2>妄想山海</h2>
                <p>追踪妄想山海游戏的最新热点、攻略、版本更新和玩家讨论</p>
                <a href="index.html" class="btn btn-wangxiang">进入查看</a>
            </div>

            <div class="game-card fc" onclick="window.location.href='fc_index.html'">
                <span class="game-icon">⚽</span>
                <h2>FC足球世界</h2>
                <p>追踪FC足球世界手游的最新热点、战术板、UT模式和球员卡</p>
                <a href="fc_index.html" class="btn btn-fc">进入查看</a>
            </div>
        </div>

        <div class="stats">
            <h3>📊 平台数据统计</h3>
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="number">2</div>
                    <div class="label">支持游戏</div>
                </div>
                <div class="stat-item">
                    <div class="number">4</div>
                    <div class="label">覆盖平台</div>
                </div>
                <div class="stat-item">
                    <div class="number">13</div>
                    <div class="label">历史数据</div>
                </div>
                <div class="stat-item">
                    <div class="number">100+</div>
                    <div class="label">每日热点</div>
                </div>
            </div>
        </div>

        <div class="footer">
            <p>
                <a href="index.html">妄想山海</a> |
                <a href="fc_index.html">FC足球世界</a> |
                <a href="https://github.com/jasinzhai/redian" target="_blank">GitHub</a>
            </p>
            <p style="margin-top: 10px;">© 2026 游戏热点追踪 - 实时更新</p>
        </div>
    </div>
</body>
</html>
