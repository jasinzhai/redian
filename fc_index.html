<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FC足球世界热点追踪 - 2026年</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            color: white;
            padding: 40px 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header .update-time {
            font-size: 1.2em;
            opacity: 0.9;
            margin-top: 10px;
        }

        .date-selector {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            display: inline-block;
        }

        .date-selector label {
            color: white;
            font-size: 1em;
            margin-right: 10px;
        }

        .date-selector input {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            cursor: pointer;
            background: white;
            min-width: 150px;
        }

        .date-selector input:focus {
            outline: 2px solid #11998e;
        }

        .date-selector input::-webkit-calendar-picker-indicator {
            cursor: pointer;
            filter: invert(0.4);
            margin-left: 5px;
            padding: 0;
        }

        .date-selector button {
            padding: 10px 20px;
            margin-left: 10px;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            cursor: pointer;
            color: white;
            font-weight: bold;
            transition: background 0.3s;
        }

        .date-selector button:hover {
            opacity: 0.9;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card .number {
            font-size: 2.5em;
            font-weight: bold;
            color: #11998e;
            margin-bottom: 10px;
        }

        .stat-card .label {
            color: #666;
            font-size: 1.1em;
        }

        .chart-container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .chart-container h2 {
            font-size: 1.8em;
            margin-bottom: 20px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chart-wrapper {
            position: relative;
            height: 300px;
            display: flex;
            justify-content: center;
        }

        .hot-section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .hot-section:hover {
            transform: translateY(-3px);
        }

        .hot-section h2 {
            font-size: 1.8em;
            margin-bottom: 20px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 15px;
            border-bottom: 3px solid #38ef7d;
        }

        .hot-items {
            display: grid;
            gap: 15px;
            max-height: 800px;
            overflow-y: auto;
            padding: 10px;
        }

        .hot-items::-webkit-scrollbar {
            width: 8px;
        }

        .hot-items::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        .hot-items::-webkit-scrollbar-thumb {
            background: #38ef7d;
            border-radius: 10px;
        }

        .hot-item {
            background: #f5f7fa;
            padding: 15px 20px;
            border-radius: 10px;
            border-left: 4px solid #38ef7d;
            transition: all 0.3s;
        }

        .hot-item:hover {
            background: #e8f5e9;
            border-left-color: #11998e;
            transform: translateX(5px);
        }

        .hot-item h3 {
            font-size: 1.3em;
            margin-bottom: 8px;
            color: #333;
        }

        .hot-item p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 10px;
        }

        .hot-item .time {
            color: #999;
            font-size: 0.85em;
        }

        .version-update {
            background: linear-gradient(135deg, #ff6b6b 0%, #feca57 100%);
            color: white;
        }

        .version-update h2 {
            color: white;
            border-bottom-color: white;
        }

        .version-update .hot-item {
            background: rgba(255, 255, 255, 0.2);
            border-left-color: white;
        }

        .version-update .hot-item h3 {
            color: white;
        }

        .version-update .hot-item p {
            color: rgba(255, 255, 255, 0.9);
        }

        .version-update .hot-item .time {
            color: rgba(255, 255, 255, 0.7);
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
            font-size: 1.1em;
        }

        .platform-icon {
            font-size: 1.5em;
            margin-right: 8px;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }
            .stat-card {
                padding: 15px;
            }
            .stat-card .number {
                font-size: 2em;
            }
            .hot-section {
                padding: 20px;
            }
            .date-selector {
                padding: 10px;
            }
            .date-selector input {
                min-width: 120px;
                padding: 8px 12px;
            }
            .date-selector button {
                padding: 8px 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚽ FC足球世界热点追踪</h1>
            <p class="update-time">最后更新: <span id="lastUpdate">加载中...</span></p>

            <div class="date-selector">
                <label for="dateSelect">选择日期:</label>
                <input type="date" id="dateSelect">
                <button onclick="loadSelectedDate()" style="background: #11998e;">查看</button>
                <button onclick="loadTodayData()" style="background: #38ef7d;">今天</button>
            </div>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="number" id="totalHotItems">0</div>
                <div class="label">总热点数量</div>
            </div>
            <div class="stat-card">
                <div class="number" id="platformCount">4</div>
                <div class="label">覆盖平台</div>
            </div>
            <div class="stat-card">
                <div class="number" id="updateCount">0</div>
                <div class="label">当日更新</div>
            </div>
        </div>

        <div class="chart-container">
            <h2>📊 热点关键词分布</h2>
            <div class="chart-wrapper">
                <canvas id="keywordChart"></canvas>
            </div>
        </div>

        <div class="hot-section version-update">
            <h2>🎮 版本更新</h2>
            <div id="versionContent" class="hot-items">
                <div class="loading">加载中...</div>
            </div>
        </div>

        <div class="hot-section">
            <h2>📱 <span class="platform-icon">📱</span>抖音热点</h2>
            <div id="douyinContent" class="hot-items">
                <div class="loading">加载中...</div>
            </div>
        </div>

        <div class="hot-section">
            <h2>📺 <span class="platform-icon">📺</span>快手热点</h2>
            <div id="kuaishouContent" class="hot-items">
                <div class="loading">加载中...</div>
            </div>
        </div>

        <div class="hot-section">
            <h2>🎬 <span class="platform-icon">🎬</span>B站热点</h2>
            <div id="bilibiliContent" class="hot-items">
                <div class="loading">加载中...</div>
            </div>
        </div>

        <div class="hot-section">
            <h2>💬 <span class="platform-icon">💬</span>贴吧讨论</h2>
            <div id="tiebaContent" class="hot-items">
                <div class="loading">加载中...</div>
            </div>
        </div>
    </div>

    <script>
        // 全局变量
        let chartInstance = null;
        let currentData = null;

        // 可用的历史日期列表
        const availableDates = [
            '2026-03-15',
            '2026-03-16',
            '2026-03-17',
            '2026-03-18',
            '2026-03-19',
            '2026-03-20',
            '2026-03-21',
            '2026-03-22',
            '2026-03-23',
            '2026-03-24',
            '2026-03-25',
            '2026-03-26',
            '2026-03-27'
        ];

        // 系统最后更新时间（固定值）
        let systemLastUpdate = '';

        // 加载系统最后更新时间
        async function loadSystemLastUpdate() {
            try {
                const response = await fetch('fc_hot_data.json?t=' + Date.now());
                if (response.ok) {
                    const data = await response.json();
                    systemLastUpdate = data.lastUpdate || new Date().toLocaleDateString();
                    document.getElementById('lastUpdate').textContent = systemLastUpdate;
                }
            } catch (error) {
                console.error('加载系统更新时间失败:', error);
                document.getElementById('lastUpdate').textContent = '加载失败';
            }
        }

        // 初始化日期选择器
        function initDateSelector() {
            const dateSelect = document.getElementById('dateSelect');

            // 设置最小日期为7天前
            const minDate = new Date();
            minDate.setDate(minDate.getDate() - 7);
            dateSelect.min = formatDate(minDate);

            // 设置最大日期为今天（因为有最新的数据）
            dateSelect.max = formatDate(new Date());

            // 监听日期选择变化，验证日期是否有效
            dateSelect.addEventListener('input', function() {
                const selectedDate = dateSelect.value;
                if (selectedDate && !availableDates.includes(selectedDate)) {
                    // 如果选择的日期没有数据，清除选择
                    dateSelect.value = '';
                }
            });
        }

        // 加载选中的日期
        async function loadSelectedDate() {
            const dateSelect = document.getElementById('dateSelect');
            const selectedDate = dateSelect.value;

            if (!selectedDate) {
                alert('请选择一个日期');
                return;
            }

            if (!availableDates.includes(selectedDate)) {
                alert(`${selectedDate} 暂无数据，请选择其他日期`);
                return;
            }

            await loadDataForDate(selectedDate);
        }

        // 加载今天的数据
        async function loadTodayData() {
            const today = new Date();
            const todayStr = formatDate(today);
            await loadDataForDate(todayStr);
            document.getElementById('dateSelect').value = todayStr;
        }

        // 根据日期加载数据
        async function loadDataForDate(date, showAlert = true) {
            const dataFile = `fc_hot_data_${date}.json`;

            try {
                const response = await fetch(dataFile + '?t=' + Date.now());
                if (!response.ok) {
                    throw new Error('数据不存在');
                }
                const data = await response.json();
                currentData = data;
                renderPage(data);
                // 不再更新lastUpdate，保持系统固定的最后更新时间
            } catch (error) {
                console.error('加载数据失败:', error);
                // 如果历史数据不存在，显示提示，但不要自动跳转
                if (showAlert) {
                    alert(`${date} 的数据不存在`);
                }
            }
        }

        // 加载今天的默认数据
        async function loadDefaultData() {
            try {
                const response = await fetch('fc_hot_data.json?t=' + Date.now());
                if (!response.ok) {
                    throw new Error('无法加载数据');
                }
                const data = await response.json();
                currentData = data;
                renderPage(data);
                // 不再更新lastUpdate，保持系统固定的最后更新时间
            } catch (error) {
                console.error('加载数据失败:', error);
                document.querySelectorAll('.loading').forEach(el => {
                    el.textContent = '暂无数据，请等待数据更新';
                });
            }
        }

        // 渲染整个页面
        function renderPage(data) {
            // 更新统计数据
            document.getElementById('totalHotItems').textContent = data.todayUpdates || 0;
            document.getElementById('updateCount').textContent = data.todayUpdates || 0;

            // 渲染版本更新
            renderVersionUpdate(data);

            // 渲染各平台热点
            if (data.douyin) renderHotItems('douyinContent', data.douyin.items);
            if (data.kuaishou) renderHotItems('kuaishouContent', data.kuaishou.items);
            if (data.bilibili) renderHotItems('bilibiliContent', data.bilibili.items);
            if (data.tieba) renderHotItems('tiebaContent', data.tieba.items);

            // 渲染关键词分布图
            renderKeywordChart(data);
        }

        // 渲染版本更新
        function renderVersionUpdate(data) {
            const container = document.getElementById('versionContent');
            if (!data.versionUpdate) {
                container.innerHTML = '<div class="loading">暂无版本更新信息</div>';
                return;
            }

            let html = `<div class="hot-item">
                <h3>${data.versionUpdate.title}</h3>
                <p>更新日期：${data.versionUpdate.date}</p>
                <p>停服时间：${data.versionUpdate.maintenanceTime}</p>
                <div style="margin-top: 10px;">
                    ${data.versionUpdate.content.map(item => `<p>• ${item}</p>`).join('')}
                </div>
            </div>`;

            container.innerHTML = html;
        }

        // 渲染热点列表
        function renderHotItems(containerId, items) {
            const container = document.getElementById(containerId);
            if (!items || items.length === 0) {
                container.innerHTML = '<div class="loading">暂无数据</div>';
                return;
            }

            const html = items.map(item => `
                <div class="hot-item">
                    <h3>${item.title}</h3>
                    <p>${item.description}</p>
                    <p class="time">时间：${item.time}</p>
                </div>
            `).join('');

            container.innerHTML = html;
        }

        // 渲染关键词分布图
        function renderKeywordChart(data) {
            // 提取所有平台的热点内容
            const allItems = [];
            ['douyin', 'kuaishou', 'bilibili', 'tieba'].forEach(platform => {
                if (data[platform] && data[platform].items) {
                    allItems.push(...data[platform].items);
                }
            });

            // 统计关键词
            const keywords = {};
            allItems.forEach(item => {
                const words = item.title.split(/[\s\u3000\uFF00]+/);
                words.forEach(word => {
                    if (word.length >= 2) {
                        keywords[word] = (keywords[word] || 0) + 1;
                    }
                });
            });

            // 取前8个最常见的关键词
            const sortedKeywords = Object.entries(keywords)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 8);

            const labels = sortedKeywords.map(k => k[0]);
            const values = sortedKeywords.map(k => k[1]);

            // 销毁旧图表
            if (chartInstance) {
                chartInstance.destroy();
            }

            // 创建新图表
            const ctx = document.getElementById('keywordChart').getContext('2d');
            chartInstance = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: labels,
                    datasets: [{
                        data: values,
                        backgroundColor: [
                            '#11998e',
                            '#38ef7d',
                            '#00b09b',
                            '#96c93d',
                            '#1dd1a1',
                            '#56ab2f',
                            '#a8e063',
                            '#56ab2f'
                        ],
                        borderWidth: 2,
                        borderColor: '#fff'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'right',
                            labels: {
                                padding: 15,
                                font: {
                                    size: 14
                                },
                                usePointStyle: true,
                                pointStyle: 'circle'
                            }
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    const label = context.label || '';
                                    const value = context.parsed || 0;
                                    const total = context.dataset.data.reduce((a, b) => a + b, 0);
                                    const percentage = ((value / total) * 100).toFixed(1);
                                    return `${label}: ${value}次 (${percentage}%)`;
                                }
                            }
                        }
                    },
                    layout: {
                        padding: 20
                    }
                }
            });
        }

        // 格式化日期
        function formatDate(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        // 页面加载完成后执行
        window.onload = function() {
            initDateSelector();
            // 加载系统最后更新时间
            loadSystemLastUpdate();
            // 初始加载最新的可用数据
            const latestDate = availableDates[availableDates.length - 1];
            if (latestDate) {
                loadDataForDate(latestDate);
                document.getElementById('dateSelect').value = latestDate;
            } else {
                // 如果没有可用日期，加载默认数据
                loadDefaultData();
            }
        };

        // 每5分钟自动刷新
        setInterval(() => {
            const selectedDate = document.getElementById('dateSelect').value;
            const today = formatDate(new Date());

            // 只在今天的数据上显示更新提示
            if (selectedDate === today) {
                loadSystemLastUpdate();
                if (selectedDate) {
                    loadDataForDate(selectedDate, false);
                } else {
                    loadDefaultData();
                }
            }
        }, 5 * 60 * 1000);
    </script>
</body>
</html>
